openapi: 3.0.0
info:
  title: Webnox Sprintly Admin Backend API
  description: |
    REST API for Webnox Sprintly Admin Dashboard.
    
    **Authentication:**
    Most endpoints require a valid JWT token. 
    1. Login via `/auth/login` (Admin) or `/auth/employee-login` (Employee).
    2. Click the **Authorize** button below and enter your token (with or without `Bearer ` prefix).
  version: 1.0.0
servers:
  - url: http://localhost:8080/api
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  
  schemas:
    ApiResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
        error:
          type: object
          properties:
            code:
              type: string
            details:
              type: object
    
    # Auth Schemas
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, example: admin@webnox.com }
        password: { type: string, format: password, example: password123 }
        role: { type: string, example: Admin }
    
    EmployeeLoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, example: employee@webnox.com }
        password: { type: string, format: password, example: password123 }

    # Employee Schema
    Employee:
      type: object
      properties:
        employeeId: { type: string }
        employeeName: { type: string }
        employeeEmail: { type: string }
        employeeRole: { type: string }
        designation: { type: string }
        status: { type: boolean }

    # Admin Schema
    Admin:
      type: object
      properties:
        adminId: { type: string }
        adminName: { type: string }
        adminPersonalEmail: { type: string }
        adminRole: { type: string }
        isActive: { type: boolean }

    # Attendance Schema
    Attendance:
      type: object
      properties:
        id: { type: string }
        employeeId: { type: string }
        date: { type: string, format: date }
        punchInTime: { type: string, format: date-time }
        punchOutTime: { type: string, format: date-time }
        status: { type: string }

    # Project Schema
    Project:
      type: object
      properties:
        id: { type: string }
        projectName: { type: string }
        projectDescription: { type: string }
        status: { type: string, enum: [NOT_STARTED, IN_PROGRESS, ON_HOLD, COMPLETED] }
        priorityLevel: { type: string, enum: [LOW, MEDIUM, HIGH, URGENT] }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }

    # Task Card Schema
    TaskCard:
      type: object
      properties:
        id: { type: string }
        projectId: { type: string }
        taskName: { type: string }
        taskDescription: { type: string }
        taskType: { type: string }
        priorityLevel: { type: string, enum: [High, Medium, Low] }
        workflowStatus: { type: string }
        fromDate: { type: string, format: date }
        toDate: { type: string, format: date }
        assignedEmployeeIds: 
          type: array
          items: { type: string }
    
    # Leave Schema
    Leave:
      type: object
      properties:
        id: { type: string }
        employeeId: { type: string }
        leaveType: { type: string }
        leaveFromDate: { type: string, format: date }
        leaveToDate: { type: string, format: date }
        totalLeaveDays: { type: number }
        leaveRemarks: { type: string }
        leaveStatus: { type: integer, description: "0: Pending, 1: Approved, 2: Rejected" }
        isPaidLeave: { type: boolean }
        isHalfDay: { type: boolean }

    # Permission Schema
    Permission:
      type: object
      properties:
        id: { type: string }
        employeeId: { type: string }
        permissionDate: { type: string, format: date }
        permissionFromTime: { type: string }
        permissionToTime: { type: string }
        permissionRemarks: { type: string }
        permissionStatus: { type: integer, description: "0: Pending, 1: Approved, 2: Rejected" }

    # WFH Schema
    WFHRequest:
      type: object
      properties:
        id: { type: string }
        employeeId: { type: string }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        reason: { type: string }
        status: { type: integer, description: "0: Pending, 1: Approved, 2: Rejected" }

    # Announcement Schema
    Announcement:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        message: { type: string }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }

    # Team Card Schema
    TeamCard:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string }
        cardType: { type: string, enum: [Meeting, KT, Learning, R&D] }
        status: { type: integer, description: "1: Active, 0: Inactive" }
    
    # Office Location Schema
    OfficeLocation:
      type: object
      required: [locationName, address, latitude, longitude]
      properties:
        locationName: { type: string }
        address: { type: string }
        latitude: { type: number }
        longitude: { type: number }
        radiusMeters: { type: integer, default: 100 }
        isActive: { type: boolean, default: true }
    
    # Dashboard Schemas
    CalendarEvent:
      type: object
      properties:
        date: { type: string, format: date }
        events: 
          type: array
          items: { type: object }

    Birthday:
      type: object
      properties:
        employeeId: { type: string }
        name: { type: string }
        date: { type: string, format: date }
        image: { type: string }

    TaskAnalytics:
      type: object
      properties:
        total: { type: integer }
        completed: { type: integer }
        pending: { type: integer }
        inProgress: { type: integer }

    # Report Schema
    Report:
      type: object
      properties:
        id: { type: string }
        employeeId: { type: string }
        date: { type: string, format: date }
        content: { type: string }
        status: { type: string }

    # Chat Schemas
    Conversation:
      type: object
      properties:
        id: { type: string }
        type: { type: string, enum: [direct, group] }
        name: { type: string }
        participants: 
          type: array
          items: { type: object }
        lastMessage: { type: object }

    Message:
      type: object
      properties:
        id: { type: string }
        conversationId: { type: string }
        senderId: { type: string }
        content: { type: string }
        createdAt: { type: string, format: date-time }
        isRead: { type: boolean }

    # Calendar Meeting Schema
    CalendarMeeting:
      type: object
      properties:
        id: { type: string }
        meetingName: { type: string }
        meetingVenue: { type: string }
        meetingDate: { type: string, format: date }
        meetingStartTime: { type: string }
        meetingEndTime: { type: string }
        hostId: { type: string }
        participantIds: 
          type: array
          items: { type: string }
        status: { type: string }

    # Todo Schema
    Todo:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string }
        dueDate: { type: string, format: date }
        priority: { type: string, enum: [Low, Medium, High] }
        status: { type: string, enum: [Pending, Completed] }
        assignedTo: { type: string }

    # Asset Schema
    Asset:
      type: object
      properties:
        id: { type: string }
        assetName: { type: string }
        assetType: { type: string }
        assetStatus: { type: string, enum: [Available, InUse, Maintenance, Retired] }
        purchaseDate: { type: string, format: date }
        usedByEmployeeId: { type: string }

    # Expense Schema
    Expense:
      type: object
      properties:
        id: { type: string }
        expenseTitle: { type: string }
        amount: { type: number }
        expenseDate: { type: string, format: date }
        expenseType: { type: string }
        paymentMethod: { type: string }
        status: { type: string }

    # Company Holiday Schema
    CompanyHoliday:
      type: object
      properties:
        id: { type: string }
        holidayName: { type: string }
        holidayDate: { type: string, format: date }
        holidayType: { type: string }
        description: { type: string }

    # Time Tracking Record Schema
    TimeTrackingRecord:
      type: object
      properties:
        id: { type: string }
        employeeId: { type: string }
        taskId: { type: string }
        taskName: { type: string }
        clockInTime: { type: string, format: date-time }
        clockOutTime: { type: string, format: date-time }
        duration: { type: string }

    # Role Schema
    Role:
      type: object
      properties:
        id: { type: string }
        roleName: { type: string }
        description: { type: string }
        permissions: { type: array, items: { type: string } }

    # Version Release Schema
    VersionRelease:
      type: object
      properties:
        id: { type: string }
        version: { type: string }
        releaseNotes: { type: string }
        releaseDate: { type: string, format: date }

    # Future Plan Schema
    FuturePlan:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string }
        targetDate: { type: string, format: date }

    # Face Enrollment Schema
    FaceEnrollment:
      type: object
      properties:
        employee_id: { type: string }
        embedding: { type: string }
        fingerprint_template: { type: string }
        department: { type: string }
        enrolled_by: { type: string }

    # Leave Policy Schema
    LeavePolicy:
      type: object
      properties:
        id: { type: string }
        policyName: { type: string }
        totalLeaves: { type: integer }
        carryForward: { type: boolean }

    # Project Document Schema
    ProjectDocument:
      type: object
      properties:
        id: { type: string }
        fileName: { type: string }
        fileUrl: { type: string }
        uploadedBy: { type: string }
        uploadedAt: { type: string, format: date-time }

    # Project Milestone Schema
    ProjectMilestone:
      type: object
      properties:
        id: { type: string }
        title: { type: string }
        description: { type: string }
        dueDate: { type: string, format: date }
        status: { type: string, enum: [Pending, Completed] }

    # Client Review Schema
    ClientReview:
      type: object
      properties:
        id: { type: string }
        reviewerName: { type: string }
        reviewDate: { type: string, format: date }
        rating: { type: integer }
        comments: { type: string }

    # Project Discontinuation Schema
    ProjectDiscontinuation:
      type: object
      properties:
        id: { type: string }
        reason: { type: string }
        discontinuedBy: { type: string }
        discontinuedAt: { type: string, format: date-time }

    # Employee Document Schema
    EmployeeDocument:
      type: object
      properties:
        id: { type: string }
        documentType: { type: string }
        documentUrl: { type: string }
        status: { type: string, enum: [Pending, Approved, Rejected] }
        uploadedAt: { type: string, format: date-time }

    # Task Card Request Schema
    TaskCardRequest:
      type: object
      properties:
        id: { type: string }
        employeeId: { type: string }
        projectId: { type: string }
        taskName: { type: string }
        description: { type: string }
        status: { type: string, enum: [Pending, Approved, Rejected] }
        requestedAt: { type: string, format: date-time }

    # Home Overview Request
    HomeOverviewRequest:
      type: object
      required: [month, year]
      properties:
        month: { type: integer }
        year: { type: integer }
        date: { type: string, format: date }

    # Monthly Events Request
    MonthlyEventsRequest:
      type: object
      required: [month, year]
      properties:
        month: { type: integer }
        year: { type: integer }

    # Date Details Request
    DateDetailsRequest:
      type: object
      required: [date]
      properties:
        date: { type: string, format: date }

    # Notification Schema
    Notification:
      type: object
      properties:
        id: { type: string }
        recipientId: { type: string }
        title: { type: string }
        body: { type: string }
        type: { type: string }
        isRead: { type: boolean }
        createdAt: { type: string, format: date-time }

    # Employee Tracker Summary
    EmployeeTrackerSummary:
      type: object
      properties:
        totalEmployees: { type: integer }
        activeEmployees: { type: integer }
        present: { type: integer }
        absent: { type: integer }
        late: { type: integer }
        onLeave: { type: integer }
        wfh: { type: integer }

security:
  - bearerAuth: []

tags:
  - name: Authentication
    description: Public endpoints for login and token verification
  - name: Admin Management
    description: Endpoints for managing Admin users
  - name: Employee Management
    description: Endpoints for managing Employees
  - name: Attendance
    description: Attendance tracking and reporting
  - name: Projects
    description: Project management endpoints
  - name: Task Cards - Admin
    description: Admin endpoints for Task Cards
  - name: Task Cards - Employee
    description: Employee endpoints for Task Cards
  - name: Leave Management
    description: Leave requests and approvals
  - name: Permission Management
    description: Time-off permission requests
  - name: WFH Management
    description: Work From Home requests
  - name: Announcements
    description: Company-wide announcements
  - name: Team Cards - Admin
    description: Admin endpoints for Team Cards (KT, Meeting, etc.)
  - name: Team Cards - Employee
    description: Employee endpoints for Team Cards
  - name: Office Locations
    description: Manage office locations for geofencing



paths:
  # ===========================
  # AUTHENTICATION
  # ===========================
  /auth/login:
    post:
      tags: [Authentication]
      summary: Admin Login
      description: Authenticate an admin user.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /auth/employee-login:
    post:
      tags: [Authentication]
      summary: Employee Login
      description: Authenticate an employee user.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeLoginRequest'
      responses:
        '200':
          description: OK

  /auth/verify-otp:
    post:
      tags: [Authentication]
      summary: Verify OTP
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [email, otp]
              properties:
                email: { type: string }
                otp: { type: string }
                role: { type: string }
      responses:
        '200': { description: OK }

  /auth/logout:
    post:
      tags: [Authentication]
      summary: Logout
      responses:
        '200': { description: Logout successful }

  # ===========================
  # ADMIN MANAGEMENT
  # ===========================
  /admins:
    get:
      tags: [Admin Management]
      summary: Get All Admins
      parameters:
        - { name: search, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string, enum: [active, inactive] } }
      responses:
        '200':
          description: List of admins
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    
    post:
      tags: [Admin Management]
      summary: Create New Admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Admin'
      responses:
        '201': { description: Admin created }

  /admins/get-by-id:
    post:
      tags: [Admin Management]
      summary: Get Admin by ID
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [adminId]
              properties:
                adminId: { type: string }
      responses:
        '200': { description: Admin details }

  /admins/{adminId}:
    put:
      tags: [Admin Management]
      summary: Update Admin
      parameters:
        - { name: adminId, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Admin'
      responses:
        '200': { description: Admin updated }
    
    delete:
      tags: [Admin Management]
      summary: Delete Admin
      parameters:
        - { name: adminId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Admin deleted }

  /admins/updateAdminStatusById:
    put:
      tags: [Admin Management]
      summary: Update Admin Status
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [admin_id, is_active]
              properties:
                admin_id: { type: string }
                is_active: { type: boolean }
      responses:
        '200': { description: Status updated }



  # ===========================
  # ATTENDANCE
  # ===========================
  /attendance:
    get:
      tags: [Attendance]
      summary: Get Attendance Records
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, default: 50 } }
        - { name: employee_id, in: query, schema: { type: string } }
        - { name: date, in: query, schema: { type: string, format: date } }
      responses:
        '200': { description: OK }
    
    post:
      tags: [Attendance]
      summary: Create Manual Attendance
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Attendance'
      responses:
        '201': { description: Created }

  /attendance/today:
    get:
      tags: [Attendance]
      summary: Get Today's Attendance
      responses:
        '200': { description: OK }

  /attendance/punch-in:
    post:
      tags: [Attendance]
      summary: Punch In
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                employee_id: { type: string }
                lat: { type: number }
                long: { type: number }
      responses:
        '201': { description: Punched In }

  /attendance/{id}/punch-out:
    put:
      tags: [Attendance]
      summary: Punch Out
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Punched Out }

  /attendance/employee/{employeeId}/summary:
    get:
      tags: [Attendance]
      summary: Get Employee Attendance Summary
      parameters:
        - { name: employeeId, in: path, required: true, schema: { type: string } }
        - { name: from_date, in: query, schema: { type: string, format: date } }
        - { name: to_date, in: query, schema: { type: string, format: date } }
      responses:
        '200': { description: OK }

  # ===========================
  # PROJECTS
  # ===========================
  /projects:
    get:
      tags: [Projects]
      summary: Get All Projects
      parameters:
        - { name: page, in: query, schema: { type: integer } }
        - { name: status, in: query, schema: { type: string } }
        - { name: search, in: query, schema: { type: string } }
      responses:
        '200': { description: OK }
    
    post:
      tags: [Projects]
      summary: Create Project
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Project'
      responses:
        '201': { description: Created }

  /projects/{id}:
    get:
      tags: [Projects]
      summary: Get Project by ID
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK }
    
    put:
      tags: [Projects]
      summary: Update Project
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Project'
      responses:
        '200': { description: Updated }
    
    delete:
      tags: [Projects]
      summary: Delete Project
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Deleted }

  /projects/statistics:
    get:
      tags: [Projects]
      summary: Get Project Statistics
      responses:
        '200': { description: OK }

  /projects/{id}/team-members:
    post:
      tags: [Projects]
      summary: Add Team Member
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [member_id]
              properties:
                member_id: { type: string }
      responses:
        '200': { description: Member added }

  # ===========================
  # TASK CARDS - ADMIN
  # ===========================
  /admin/task-cards:
    get:
      tags: [Task Cards - Admin]
      summary: Get All Task Cards (Admin)
      parameters:
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, default: 50 } }
        - { name: project_id, in: query, schema: { type: string } }
        - { name: employee_id, in: query, schema: { type: string } }
        - { name: workflow_status, in: query, schema: { type: string } }
        - { name: priority_level, in: query, schema: { type: string } }
      responses:
        '200': { description: OK }
    
    post:
      tags: [Task Cards - Admin]
      summary: Create Task Card
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCard'
      responses:
        '201': { description: Created }

  /admin/task-cards/{taskId}:
    get:
      tags: [Task Cards - Admin]
      summary: Get Task Card by ID
      parameters:
        - { name: taskId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: OK }

    put:
      tags: [Task Cards - Admin]
      summary: Update Task Card
      parameters:
        - { name: taskId, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCard'
      responses:
        '200': { description: Updated }
    
    delete:
      tags: [Task Cards - Admin]
      summary: Delete Task Card
      parameters:
        - { name: taskId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Deleted }

  /admin/task-cards/{taskId}/duplicate:
    post:
      tags: [Task Cards - Admin]
      summary: Duplicate Task Card
      parameters:
        - { name: taskId, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [employee_ids]
              properties:
                employee_ids: { type: array, items: { type: string } }
      responses:
        '201': { description: Duplicated }

  /admin/task-cards/{taskId}/reassign:
    put:
      tags: [Task Cards - Admin]
      summary: Reassign Task Card
      parameters:
        - { name: taskId, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [new_employee_id, reason]
              properties:
                new_employee_id: { type: string }
                reason: { type: string }
      responses:
        '200': { description: Reassigned }

  # ===========================
  # TASK CARDS - EMPLOYEE
  # ===========================
  /employee/task-cards:
    get:
      tags: [Task Cards - Employee]
      summary: Get My Task Cards
      parameters:
        - { name: employee_id, in: query, required: true, schema: { type: string } }
      responses:
        '200': { description: OK }

  /employee/task-cards/{taskId}/decision:
    patch:
      tags: [Task Cards - Employee]
      summary: Accept/Reject Task
      parameters:
        - { name: taskId, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [employee_id, status]
              properties:
                employee_id: { type: string }
                status: { type: integer, description: "1: Accept, 2: Reject" }
                reason: { type: string }
      responses:
        '200': { description: OK }

  /employee/task-cards/{taskId}/work-status:
    patch:
      tags: [Task Cards - Employee]
      summary: Update Work Status (Start/Pause/Complete)
      parameters:
        - { name: taskId, in: path, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
